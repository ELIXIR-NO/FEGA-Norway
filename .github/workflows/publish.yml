name: Publish package to GitHub Packages
on:
  #  release:
  #    types: [created]
  push:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3.5.0

      - name: Create tag
        id: tag
        uses: anothrNick/github-tag-action@1.70.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

      - name: Get current tag
        run: echo "CURRENT_TAG=${{ steps.tag.outputs.new_tag }}" >> $GITHUB_ENV

      - name: Publish package clearinghouse
        run: ./gradlew :lib:clearinghouse:publish -Pversion=${{ env.CURRENT_TAG }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package crypt4gh
        run: ./gradlew :lib:crypt4gh:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
